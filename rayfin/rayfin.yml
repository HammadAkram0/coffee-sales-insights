id: coffee-sales-insights
name: coffee-sales-insights
version: 1.0.11
services:
  auth:
    enabled: true
    customClaims:
      app_version: 1.0.0
    scopes:
      - read:data
      - write:data
    password:
      enabled: false
    allowedRedirectUris:
      - http://localhost:5173
      - https://sonic-glen-5f6f5c0351-westeurope.webapp.fabricapps.net
    fabric:
      enabled: true
  data:
    enabled: true
    dialect: mssql
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: echo "no build"
    indexDocument: index.html
  storage:
    enabled: false
  functions:
    enabled: false
